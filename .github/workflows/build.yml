name: Build WordPress Plugin

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @ogx/frontend build
        env:
          VITE_MX_SIGNUP_URL: ${{ vars.VITE_MX_SIGNUP_URL }}
          VITE_MX_ALIGNMENTS_URL: ${{ vars.VITE_MX_ALIGNMENTS_URL }}

      - name: Assemble plugin
        run: |
          mkdir -p dist-plugin/ogx-signup-form
          cp -r wordpress/aiesec-signup-form/* dist-plugin/ogx-signup-form
          cp -r packages/frontend/dist/assets dist-plugin/ogx-signup-form

      - uses: actions/upload-artifact@v7
        with:
          name: signup-form-plugin
          path: dist-plugin/
